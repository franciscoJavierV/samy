services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672" # AMQP (default for amqplib / RABBITMQ_URL)
      - "15672:15672" # management UI (optional): http://localhost:15672 guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
